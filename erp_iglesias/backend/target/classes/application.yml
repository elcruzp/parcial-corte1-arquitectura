# ========================================================================
# CONFIGURACIÓN BASE - ERP IGLESIAS (CAMBIO 5: CONFIGURACIÓN EXTERNALIZADA)
# ========================================================================
# ADR-010: Configuración Externalizada (12-Factor App)
# Beneficios: Diferentes configs por entorno sin recompilar
# Variables de entorno para secretos (no en código)
# ========================================================================

spring:
  application:
    name: erp-iglesias-admin

  profiles:
    active: local  # Por defecto usa 'local', cambiar a 'prod' en producción

  # Configuración de BD (externalizada por entorno)
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/iglesiadmin}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # Configuración JPA/Hibernate
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
        show_sql: ${HIBERNATE_SHOW_SQL:false}
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Configuración de seguridad
  security:
    user:
      name: ${ADMIN_USER:admin}
      password: ${ADMIN_PASSWORD:admin123}

# Configuración JWT (externalizada)
app:
  jwt:
    secret: ${JWT_SECRET:super-secret-key-change-please-32bytes-minimum}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}  # 8 horas por defecto

# Configuración de logging
logging:
  level:
    com.iglesia: ${LOG_LEVEL:INFO}
    org.springframework.security: ${SPRING_SECURITY_LOG_LEVEL:WARN}
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG_LEVEL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${HIBERNATE_BINDER_LOG_LEVEL:TRACE}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Configuración del servidor
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${CONTEXT_PATH:/api}

# Configuración de gestión (actuators)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized